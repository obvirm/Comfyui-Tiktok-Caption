<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!--
      Beast: outline + glow + drop-shadow, all in SVG.

      The glow and shadow can spread well past the text. An SVG <filter>
      clips to a region relative to the element's bbox, so style.css pads
      `.segment` (with a matching negative margin) to grow that bbox by the
      effect's reach, keeping layout/alignment/hitzone untouched. This
      region then only needs a little slack on top of that padded box.

      Lengths are authored in `em` and resolved to px per render (SVG
      primitive attributes take neither em nor calc). Dilation grows
      outward, so the outline radius IS the visible thickness.

      SourceAlpha is the raw glyph, so the dilation and the glow stay
      clean; the coloured fill rides in on SourceGraphic and lands on top.
    -->
    <filter id="beast-outline" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <!-- OUTLINE: dilate the glyph silhouette, fill with ink. -->
      <feMorphology in="SourceAlpha" operator="dilate"
                    radius="var(--tscaps-outline-thickness, 0.125)em" result="dilated"/>
      <feFlood flood-color="var(--tscaps-shadow-color, #000)" result="inkFlood"/>
      <feComposite in="inkFlood" in2="dilated" operator="in" result="outline"/>

      <!-- GLOW: soft coloured halo from the glyph. Sits below the outline,
           so at radius 0 it collapses to the glyph and stays hidden under
           the wider opaque outline — no halo until it spreads past it. -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="var(--tscaps-glow-radius, 0)em" result="glowSpread"/>
      <feFlood flood-color="var(--tscaps-glow-color, #ffea00)" result="glowFlood"/>
      <feComposite in="glowFlood" in2="glowSpread" operator="in" result="glow"/>

      <!-- DROP SHADOW: offset + soften the outline silhouette, opaque ink. -->
      <feOffset in="dilated" dx="0" dy="var(--tscaps-shadow-distance, 0.04)em" result="shadowShape"/>
      <feGaussianBlur in="shadowShape" stdDeviation="var(--tscaps-shadow-blur, 0.04)em" result="shadowSpread"/>
      <feFlood flood-color="var(--tscaps-shadow-color, #000)" result="shadowFlood"/>
      <feComposite in="shadowFlood" in2="shadowSpread" operator="in" result="shadow"/>

      <!-- STACK bottom to top: shadow, glow, outline, crisp coloured fill. -->
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
